<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Player Analysis</title>\n    <script src=\"https://unpkg.com/react/umd/react.production.min.js\" crossorigin></script>\n    <script src=\"https://unpkg.com/react-dom/umd/react-dom.production.min.js\" crossorigin></script>\n    <script src=\"https://unpkg.com/recharts/umd/Recharts.min.js\" crossorigin></script>\n</head>\n<body>\n    <div id=\"root\"></div>\n    <script>\n        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = Recharts;\n        const PlayerAnalysis = () => {\n            const data = [\n                { name: 'Player 1', score: 4000 },\n                { name: 'Player 2', score: 3000 },\n                { name: 'Player 3', score: 2000 },\n                { name: 'Player 4', score: 2780 },\n                { name: 'Player 5', score: 1890 },\n            ];\n            return (\n                <div style={{ width: '100%', height: 300, margin: '0 auto' }}>\n                    <h2 style={{ textAlign: 'center' }}>Player Score Analysis</h2>\n                    <LineChart width={500} height={300} data={data}>\n                        <CartesianGrid strokeDasharray=\"3 3\" />\n                        <XAxis dataKey=\"name\" />\n                        <YAxis />\n                        <Tooltip />\n                        <Legend />\n                        <Line type=\"monotone\" dataKey=\"score\" stroke=\"#8884d8\" activeDot={{ r: 8 }} />\n                    </LineChart>\n                </div>\n            );\n        };\n        ReactDOM.render(<PlayerAnalysis />, document.getElementById('root'));\n    </script>\n</body>\n</html>
